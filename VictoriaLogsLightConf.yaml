server:
  image:
    tag: "v1.50.0"

  # Basic Auth (username + password) Ensure it mach fluentBit or it will fails
  #extraArgs:
  #  httpAuth.username: "admin1"
  #  httpAuth.password: "ShouldNotBePlaintext"  #should go in GH secret or something clean. but today it is full open so if someone smart find this it s still not the end of world for now
  
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"   # ← change only if your ClusterIssuer has a different name
    pathType: Prefix
    hosts:
      - name: victorialogs.dialecthub.net
        path:
          - /
        port: http
    tls:
      - secretName: victorialogs-tls
        hosts:
          - victorialogs.dialecthub.net

  # Use PVC with local-path instead of hostPath
  persistentVolume:
    enabled: true
    storageClass: "local-path"
    size: 15Gi
    accessModes:
      - ReadWriteOnce

  retentionPeriod: "15d"
  retentionMaxDiskUsagePercent: "80"     #to be safe on disk space

  resources:
    limits:
      cpu: "400m"
      memory: "384Mi"
    requests:
      cpu: "100m"
      memory: "192Mi"