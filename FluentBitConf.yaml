tolerations:
  - operator: Exists

resources:
  limits:
    cpu: 150m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Disable default Elasticsearch output
config:
  outputs: |
    [OUTPUT]
        Name              http
        Match             *
        Host              victoria-logs-victoria-logs-single-server.logging.svc.cluster.local
        Port              9428
        URI               /insert/jsonline?_msg_field=log&_time_field=time&_stream_fields=k8s.namespace.name,k8s.pod.name,k8s.container.name
        Format            json_lines
        Json_Date_Format  iso8601
        Retry_Limit       5

  # Kubernetes metadata enrichment
  filters: |
    [FILTER]
        Name                kubernetes
        Match               *
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off
        Labels              On
        Annotations         On

    # Optional: Reduce noise
    [FILTER]
        Name   grep
        Match  *
        Exclude namespace_name ^(logging|kube-system)$