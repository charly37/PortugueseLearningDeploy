tolerations:
  - operator: Exists

resources:
  limits:
    cpu: 150m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Disable default Elasticsearch output
config:
  # Global Fluent Bit settings (Log_Level = warn removes the noisy HTTP 200 messages)
  service: |
    [SERVICE]
        Daemon Off
        Flush 1
        Log_Level warn                  # ← this is the important change
        Parsers_File /fluent-bit/etc/parsers.conf
        Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On

  outputs: |
    [OUTPUT]
        Name              http
        Match             *
        Host              victoria-logs-victoria-logs-single-server.logging.svc.cluster.local
        Port              9428
        URI               /insert/jsonline?_msg_field=log&_time_field=time&_stream_fields=k8s.namespace.name,k8s.pod.name,k8s.container.name
        Format            json_lines
        Json_Date_Format  iso8601
        Retry_Limit       5

  # Kubernetes metadata enrichment
  filters: |
    [FILTER]
        Name                kubernetes
        Match               *
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off
        Labels              On
        Annotations         On