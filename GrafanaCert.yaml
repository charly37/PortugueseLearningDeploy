apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: logging
spec:
  secretName: grafana-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: grafana.dialecthub.net
  dnsNames:
    - grafana.dialecthub.net
  duration: 2160h
  renewBefore: 360h