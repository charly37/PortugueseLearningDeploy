# ClusterIssuers are cluster-scoped — no namespace field.
# Two issuers are provided:
#   letsencrypt-staging: use first to test without hitting rate limits
#   letsencrypt-prod:    use once staging works (set ingress.clusterIssuer=letsencrypt-prod)
#
# Set certManager.createIssuers=false on secondary releases (e.g. staging)
# since ClusterIssuers are shared cluster-wide and already created by the primary release.
{{- if .Values.certManager.createIssuers }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    {{- include "portuguese-learning.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ .Values.certManager.email }}
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    {{- include "portuguese-learning.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.certManager.email }}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
{{- end }}
