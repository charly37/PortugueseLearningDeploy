apiVersion: v1
kind: ConfigMap
metadata:
  name: vm-scrape-config
  namespace: logging
data:
  scrape.yml: |
    scrape_configs:
      # === Portuguese Learning App ===
      - job_name: portuguese-learning-app
        scrape_interval: 30s
        static_configs:
          - targets: ['portuguese-learning-app.portuguese-learning:80']
        metrics_path: /metrics
        relabel_configs:
          - target_label: job
            replacement: portuguese-learning-app
          - target_label: namespace
            replacement: portuguese-learning

      # === Node Exporter ===
      - job_name: node-exporter
        scrape_interval: 30s
        static_configs:
          - targets: ['node-exporter-prometheus-node-exporter:9100']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
          - target_label: job
            replacement: node-exporter

      # (Optional but recommended) Scrape VictoriaMetrics itself
      - job_name: victoriametrics
        scrape_interval: 30s
        static_configs:
          - targets: ['vm-victoria-metrics-single-server:8428']
        metrics_path: /metrics